<body class="bg-[#0f172a] text-white">

  <div class="max-w-4xl mx-auto p-6">

    <!-- BACK -->
    <button onclick="history.back()" class="mb-4 text-sm text-amber-400">
      ← Back
    </button>

    <!-- PROFILE -->
    <div class="bg-white/5 p-6 rounded-2xl">

      <div class="flex items-center gap-4">
        <img id="p-img" class="w-20 h-20 rounded-full border-2 border-amber-400"/>

        <div>
          <h2 id="p-name" class="text-xl font-bold"></h2>

          <p class="text-sm text-slate-400">
            ❤️ <span id="p-likes">0</span> |
            👥 <span id="p-followers">0</span> |
            🔁 <span id="p-following">0</span>
          </p>
        </div>
      </div>

      <!-- POSTS -->
      <div id="p-posts" class="mt-6 space-y-3"></div>

    </div>
    

  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, getDocs, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 KU DAR CONFIG (COPY KII HORE)
const firebaseConfig = {
  apiKey: "AIzaSyD47-Dhp5IAEzwJuftSHjrbspQHcKFnxTk",
  authDomain: "eidconnect.firebaseapp.com",
  projectId: "eidconnect",
  storageBucket: "eidconnect.firebasestorage.app",
  messagingSenderId: "39777262425",
  appId: "1:39777262425:web:d9ab54c1bfa9024ac58a48",
};

// 🔥 KU DAR KAN
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👉 URL ka qaado UID
const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get("uid");
if (!uid) {
  alert("User not found");
  window.location.href = "/";
  }

// 👉 LOAD USER
async function loadProfile() {
  const snap = await getDoc(doc(db, "users", uid));

if (!snap.exists()) {
  alert("User not found");
  return;
}

const data = snap.data();

  document.getElementById("p-name").innerText = data.name;
  document.getElementById("p-img").src = data.photo;
  document.getElementById("p-likes").innerText = data.likesCount || 0;
  document.getElementById("p-followers").innerText = data.followers?.length || 0;
  document.getElementById("p-following").innerText = data.following?.length || 0;

  // POSTS
  const q = query(collection(db, "messages"), orderBy("createdAt","desc"));
  const snapPosts = await getDocs(q);

 const container = document.getElementById("p-posts");
container.innerHTML = "";

snapPosts.forEach(docSnap => {
  const d = docSnap.data();
  if (d.uid === uid) {
    const div = document.createElement("div");
    div.className = "bg-white/5 p-3 rounded";

    div.innerHTML = `
      <p class="text-white">${d.text}</p>
      <span class="text-xs text-slate-400">
        ${d.createdAt ? d.createdAt.toDate().toLocaleString() : "Just now"}
      </span>
    `;

    container.appendChild(div);
  }
});

} // 👈 muhiim

loadProfile();
</script>

</body>
